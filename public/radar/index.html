<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Macro Sentinel Archive</title>
  <style>
    body{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;margin:20px;background:#050505;color:#f4f4f5}
    a{color:#d4d4d8;text-decoration:none}
    a:hover{text-decoration:underline}
    .mut{color:#a1a1aa;font-size:12px}
    .card{border:1px solid #27272a;background:#111113;padding:14px;border-radius:0;max-width:860px}
    .line{display:flex;justify-content:space-between;gap:12px;align-items:center}
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 8px 0">Macro Sentinel Archive</h2>
    <div class="mut">Daily HTML reports (latest first).</div>
    <ul id="list"></ul>
  </div>
<script>
fetch('./index.json', {cache:'no-store'})
  .then(r => r.ok ? r.json() : [])
  .then(files => {
    const ul = document.getElementById('list');
    (files||[]).forEach(item => {
      const f = (typeof item === 'string') ? { file: item } : item;
      const name = f.file || '';
      const hash = (f.sha256 || '').slice(0, 10);
      const li=document.createElement('li');
      li.innerHTML = `<div class="line"><a href="${name}">${name}</a>${hash ? `<span class="mut">#${hash}</span>` : ''}</div>`;
      ul.appendChild(li);
    });
  })
  .catch(()=>{});
</script>
</body>
</html>
