<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Macro Sentinel Archive</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:20px;background:#0b0d10;color:#e8edf2}
    a{color:#67b7ff;text-decoration:none}
    a:hover{text-decoration:underline}
    .mut{color:#9aa6b2;font-size:12px}
    .card{border:1px solid #1f2a35;background:#0f141a;padding:14px;border-radius:10px;max-width:720px}
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 8px 0">Macro Sentinel Archive</h2>
    <div class="mut">Daily HTML reports (latest first).</div>
    <ul id="list"></ul>
  </div>
<script>
fetch('./index.json', {cache:'no-store'})
  .then(r => r.ok ? r.json() : [])
  .then(files => {
    const ul = document.getElementById('list');
    (files||[]).forEach(item => {
      const f = (typeof item === 'string') ? { file: item } : item;
      const name = f.file || '';
      const hash = (f.sha256 || '').slice(0, 10);
      const li=document.createElement('li');
      li.innerHTML = `<a href="${name}">${name}</a>${hash ? ` <span class="mut">#${hash}</span>` : ''}`;
      ul.appendChild(li);
    });
  })
  .catch(()=>{});
</script>
</body>
</html>
