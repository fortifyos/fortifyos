name: Pre-Market Radar

on:
  schedule:
    # Run at 13:00 and 14:00 UTC on weekdays to stay DST-safe for US Eastern.
    # The script gates to 08:00 America/New_York by default.
    - cron: "0 13 * * 1-5"
    - cron: "0 14 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r radar/requirements.txt

      - name: Generate radar
        env:
          # Runtime timezone for 08:00 run gate:
          RADAR_TZ: America/New_York

          # Optional data sources (best-effort):
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

          # Discord delivery:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          # Kill switch:
          STOP_PREMARKET_RADAR: ${{ secrets.STOP_PREMARKET_RADAR }}
        run: |
          python radar/scripts/radar.py \
            --tickers radar/config/tickers.json \
            --outdir radar/out \
            --json radar/out/latest.json \
            --public-json public/macro-sentinel/latest.json

      - name: Publish HTML to site
        run: |
          mkdir -p public/radar
          cp radar/out/*.html public/radar/ 2>/dev/null || true
          cp radar/out/index.json public/radar/index.json 2>/dev/null || true

      - name: Commit daily archive
        run: |
          if [ -d "radar/out" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add radar/out public/macro-sentinel public/radar || true
            git diff --cached --quiet || (git commit -m "chore(radar): daily pre-market report" && git push)
          fi
