name: Update Market Prices

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write # Needed to commit macro.json back to repo

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run price updater
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: node scripts/update-prices.js

      - name: Refresh Radar market feed
        run: python3 app/macro/jobs/run_macro_update.py --no-ai

      - name: Commit updated prices
        run: |
          git config user.name "FortifyOS Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/macro.json public/macro-news.json public/macro-intel
          git diff --staged --quiet && echo "No price changes, skipping commit." || \
            (git commit -m "chore: update prices [$(date -u +'%Y-%m-%d %H:%M UTC')]" && git push)
