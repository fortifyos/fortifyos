name: Update Market Prices

on:
  schedule:
    # Every hour during market hours (9am–5pm ET = 13–21 UTC), Mon–Fri
    - cron: '0 13-21 * * 1-5'
    # Once daily on weekends to keep cache warm
    - cron: '0 14 * * 0,6'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write # Needed to commit macro.json back to repo

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run price updater
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: corepack pnpm update-prices

      - name: Commit updated prices
        run: |
          git config user.name "FortifyOS Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/macro.json public/macro-news.json
          git diff --staged --quiet && echo "No price changes, skipping commit." || \
            (git commit -m "chore: update prices [$(date -u +'%Y-%m-%d %H:%M UTC')]" && git push)
